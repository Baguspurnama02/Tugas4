<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Bermain Bersama Si Bagus</h1>
    <script>
        function myGame() {
            let yourName = prompt("Halo! Siapa nama kamu?");
            if (!yourName) yourName = "Teman";

            let lanjut = confirm("Hai " + yourName + ", aku Bagus. Mau coba menjawab pertanyaan ku?");

            if (lanjut == false) {
                alert("Terima kasih sudah bermain, " + yourName + "!");
                return;
            }

            let skor = 0;

            let quest1 = prompt("Apa nama panjang ku?");
            if (quest1 !== null && quest1.toLowerCase() === "bagus purnama rahadi") {
                alert("Kamu Benar!");
                skor++;
            } else {
                alert("Kamu Salah! Yang benar adalah Bagus Purnama Rahadi");
            }

            let quest2 = prompt("Tebak dimana aku lahir?");
            if (quest2 === "pekanbaru") {
                alert("Kamu Benar Lagi!");
                skor++;
            } else {
                alert("Kamu Salah! Yang benar adalah pekanbaru");
            }

            let quest3 = prompt("Siapa nama panggilan ketua kelas D?");
            if (quest3 !== null && quest3.toLowerCase() === "fajar") {
                alert("Kamu Benar Lagi!");
                skor++;
            } else {
                alert("Kamu Salah! Yang benar adalah fajar");
            }

            if (skor === 3) {
                alert("Selamat " + yourName + "! Kamu dapat skor " + skor + "/3. Kamu menjawab dengan benar semua sobat!");
            } else if (skor >= 1) {
                alert("Bagus " + yourName + "! Kamu dapat skor " + skor + "/3. Hampir, tapi tidak apa apa sobat!");
            } else {
                alert("Yah " + yourName + ", kamu dapat skor " + skor + "/3. Gapapa, coba lagi ya sobat!.");
            }
        }
    </script>

    <button onclick="myGame()">Game Pertanyaan</button>
</body>
</html>
